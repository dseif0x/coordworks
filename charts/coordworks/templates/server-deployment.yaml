apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "coordworks.fullname" . }}
  labels:
    {{- include "coordworks.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
spec:
  # SQLite state on a RWO volume: exactly one replica, recreated on upgrade.
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "coordworks.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "coordworks.selectorLabels" . | nindent 8 }}
      {{- with .Values.server.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: server
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: COORDWORKS_ADDR
              value: ":8080"
            - name: COORDWORKS_DB
              value: /data/coordworks.db
            - name: COORDWORKS_EMBEDDED_RUNNER
              value: {{ .Values.server.embeddedRunner | quote }}
            - name: COORDWORKS_RUNNER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "coordworks.secretName" . }}
                  key: runner-token
            - name: COORDWORKS_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "coordworks.secretName" . }}
                  key: api-token
                  optional: true
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
          {{- with .Values.server.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.existingClaim | default (printf "%s-data" (include "coordworks.fullname" .)) }}
          {{- else }}
          emptyDir: {}
          {{- end }}
      {{- with .Values.server.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.server.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.server.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}

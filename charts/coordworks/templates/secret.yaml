{{- if not .Values.auth.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "coordworks.fullname" . }}
  labels:
    {{- include "coordworks.labels" . | nindent 4 }}
type: Opaque
stringData:
  runner-token: {{ required "auth.runnerToken is required (or set auth.existingSecret)" .Values.auth.runnerToken | quote }}
  api-token: {{ .Values.auth.apiToken | quote }}
{{- end }}

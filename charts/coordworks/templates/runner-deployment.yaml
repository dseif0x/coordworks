{{- if .Values.runner.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "coordworks.fullname" . }}-runner
  labels:
    {{- include "coordworks.labels" . | nindent 4 }}
    app.kubernetes.io/component: runner
spec:
  replicas: {{ .Values.runner.replicas }}
  selector:
    matchLabels:
      {{- include "coordworks.runnerSelectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "coordworks.runnerSelectorLabels" . | nindent 8 }}
      {{- with .Values.runner.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: runner
          image: "{{ .Values.runner.image.repository }}:{{ .Values.runner.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.runner.image.pullPolicy }}
          env:
            - name: COORDWORKS_SERVER_URL
              value: "http://{{ include "coordworks.fullname" . }}:{{ .Values.service.port }}"
            - name: COORDWORKS_RUNNER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "coordworks.secretName" . }}
                  key: runner-token
            - name: COORDWORKS_RUNNER_LABELS
              value: {{ .Values.runner.labels | quote }}
            - name: COORDWORKS_RUNNER_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          {{- with .Values.runner.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.runner.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.runner.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.runner.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
